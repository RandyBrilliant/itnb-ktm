# ITNB Hub – HTTP (redirect to HTTPS in production)
server {
    listen 80;
    server_name _;

    # Health check endpoint (no HTTPS redirect)
    location /health/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    # Redirect all other HTTP traffic to HTTPS (in production)
    location / {
        return 301 https://$host$request_uri;
    }
}

