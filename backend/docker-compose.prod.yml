# ITNB Hub – production
# Usage:
#   First deploy:  ./deploy/deploy-fresh.sh
#   CI deploy:     APP_IMAGE=ghcr.io/<owner>/itnb-hub-api:<sha> ./deploy/deploy-registry.sh
# .env: SECRET_KEY, DEBUG=False, ALLOWED_HOSTS, SQL_*, DATABASE_URL, CELERY_BROKER_URL, APP_IMAGE (optional)

services:
  redis:
    image: redis:7-alpine
    container_name: itnb-hub-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - itnb-network

  nginx:
    image: nginx:alpine
    container_name: itnb-hub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/itnb-hub.conf:/etc/nginx/conf.d/itnb-hub.conf:ro
      - ./nginx/itnb-hub.ssl.conf:/etc/nginx/conf.d/itnb-hub.ssl.conf:ro
      - ./nginx/certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_volume:/app/media:ro
      - static_volume:/app/staticfiles:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - itnb-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ${APP_IMAGE:-itnb-hub-api:latest}
    container_name: itnb-hub-backend
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    command: ./entrypoint.sh daphne -b 0.0.0.0 -p 8000 --proxy-headers backend.asgi:application
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${SQL_USER:-postgres}:${SQL_PASSWORD:-}@db:5432/${SQL_DATABASE:-itnb_hub}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - itnb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  celery:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ${APP_IMAGE:-itnb-hub-api:latest}
    container_name: itnb-hub-celery
    user: "1000:1000"
    command: celery -A backend worker -l info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${SQL_USER:-postgres}:${SQL_PASSWORD:-}@db:5432/${SQL_DATABASE:-itnb_hub}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - itnb-network
    healthcheck:
      disable: true

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ${APP_IMAGE:-itnb-hub-api:latest}
    container_name: itnb-hub-celery-beat
    user: "1000:1000"
    command: celery -A backend beat -l info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${SQL_USER:-postgres}:${SQL_PASSWORD:-}@db:5432/${SQL_DATABASE:-itnb_hub}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - itnb-network
    healthcheck:
      disable: true

  db:
    image: postgres:15-alpine
    container_name: itnb-hub-db
    environment:
      POSTGRES_DB: ${SQL_DATABASE:-itnb_hub}
      POSTGRES_USER: ${SQL_USER:-postgres}
      POSTGRES_PASSWORD: ${SQL_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER:-postgres} -d ${SQL_DATABASE:-itnb_hub}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - itnb-network
    expose:
      - 5432

networks:
  itnb-network:
    driver: bridge

volumes:
  postgres_data:
  media_volume:
  static_volume:
  redis_data:
