name: Build & Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/docker-production.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: itnb-hub-api

jobs:
  test:
    name: Django checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production-use-only
      DEBUG: 'True'
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test --verbosity=1

  build-and-deploy:
    name: Build image & deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: img
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${OWNER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          SSH_KEY_B64: ${{ secrets.DO_SSH_PRIVATE_KEY_B64 }}
        run: |
          install -m 700 -d ~/.ssh
          if [ -n "$SSH_KEY_B64" ]; then
            echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s\n' "$SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -lf ~/.ssh/deploy_key

      - name: Add VPS host key
        run: ssh-keyscan -H -p "${{ secrets.DO_SSH_PORT }}" "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          APP_IMAGE: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o StrictHostKeyChecking=yes"
          ssh $SSH_OPTS -p "${{ secrets.DO_SSH_PORT }}" "${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}" \
            "APP_IMAGE='${APP_IMAGE}' REGISTRY='${REGISTRY}' GHCR_USER='${GHCR_USER}' GHCR_TOKEN='${GHCR_TOKEN}' PROJECT_PATH='${{ secrets.DO_PROJECT_PATH }}' bash -s" << 'EOF'
          set -euo pipefail
          cd "$PROJECT_PATH"
          echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin
          BEFORE_HEAD="$(git rev-parse HEAD 2>/dev/null || true)"
          REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || dirname "$PROJECT_PATH")"
          git -C "$REPO_ROOT" pull origin main
          AFTER_HEAD="$(git rev-parse HEAD 2>/dev/null || true)"
          CHANGED_FILES="$(git -C "$REPO_ROOT" diff --name-only "$BEFORE_HEAD" "$AFTER_HEAD" 2>/dev/null || true)"
          chmod +x deploy/*.sh deploy/lib/*.sh 2>/dev/null || true
          APP_IMAGE="$APP_IMAGE" CHANGED_FILES="$CHANGED_FILES" AUTO_DEPLOY=true SKIP_PULL_CODE=true \
            ./deploy/deploy-registry.sh
          docker logout "$REGISTRY" || true
          EOF

      - name: Verify deployment health
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o StrictHostKeyChecking=yes"
          ssh $SSH_OPTS -p "${{ secrets.DO_SSH_PORT }}" "${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}" \
            "PROJECT_PATH='${{ secrets.DO_PROJECT_PATH }}' bash -s" << 'EOF'
          set -euo pipefail
          cd "$PROJECT_PATH"
          PORT="$(grep -E '^API_PORT=' .env 2>/dev/null | head -n1 | cut -d= -f2 | tr -d '[:space:]' || true)"
          PORT="${PORT:-8000}"
          for i in $(seq 1 6); do
            if curl -fsS --max-time 5 "http://127.0.0.1:${PORT}/health/" 2>/dev/null \
              | grep -qE '"status"[[:space:]]*:[[:space:]]*"ok"|"success"[[:space:]]*:[[:space:]]*true'; then
              echo "Health check passed"
              exit 0
            fi
            sleep 5
          done
          exit 1
          EOF
